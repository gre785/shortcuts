<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shortcuts cheatsheet</title>
    <!-- CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootswatch/3.2.0/sandstone/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.2.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="app.css">
    <style>
        body { padding-top:50px; }
        .controls-row { margin-bottom: 20px; }
        .checkbox-container { padding-top: 6px; } /* Vertically centers text with the search input */
    </style>
    <!-- JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.2.23/angular.min.js"></script>
    <script src="https://code.angularjs.org/1.3.10/angular-sanitize.js"></script>
    <script src="app.js"></script>
</head>
<body>

<div class="container" ng-app="ideShortcuts" ng-controller="mainController">

    <div class="panel panel-default">
        <div class="panel-body">
            This page helps developers translate keyboard shortcuts between different IDEs.<br>
            Enter a shortcut key combination in the search box to quickly locate equivalent shortcuts across them.
        </div>
    </div>

    <!-- Search and Toggles on the same line using Bootstrap Grid -->
    <div class="row controls-row">
        <!-- Search Bar (takes up 5 columns on medium+ screens) -->
        <div class="col-md-5 col-sm-12">
            <div class="input-group">
                <div class="input-group-addon"><i class="fa fa-search" ng-hide="search"></i><i class="fa fa-times ng-cloak" ng-show="search" ng-click="search=''"></i></div>
                <input name="searchField" autofocus type="text" class="form-control" placeholder="Shortcut quick search"
                       ng-model="search" ng-keydown="onKeyDown($event)">
            </div>
        </div>

        <!-- Column Visibility Toggles (takes up 7 columns on medium+ screens, right aligned) -->
        <div class="col-md-7 col-sm-12 text-right checkbox-container">
            <label class="checkbox-inline">
                <input type="checkbox" ng-model="showCols.eclipse" ng-init="showCols.eclipse=true"> Eclipse
            </label>
            <label class="checkbox-inline">
                <input type="checkbox" ng-model="showCols.vscode" ng-init="showCols.vscode=true"> VS Code
            </label>
            <label class="checkbox-inline">
                <input type="checkbox" ng-model="showCols.intellij" ng-init="showCols.intellij=true"> IntelliJ
            </label>
            <label class="checkbox-inline">
                <input type="checkbox" ng-model="showCols.visualstudio" ng-init="showCols.visualstudio=true"> Visual Studio
            </label>
            <label class="checkbox-inline">
                <input type="checkbox" ng-model="showCols.qt" ng-init="showCols.qt=true"> QT
            </label>
        </div>
    </div>

    <!-- Table -->
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <td style="background-color: #2D3748; color: white;">
                <strong>Description</strong>
            </td>
            <!-- ng-show applied to headers -->
            <td ng-show="showCols.eclipse" style="background-color: #2D3748; color: white;">
                <strong>Eclipse</strong>
            </td>
            <td ng-show="showCols.vscode" style="background-color: #2D3748; color: white;">
                <strong>VS Code</strong>
            </td>
            <td ng-show="showCols.intellij" style="background-color: #2D3748; color: white;">
                <strong>IntelliJ</strong>
            </td>
            <td ng-show="showCols.visualstudio" style="background-color: #2D3748; color: white;">
                <strong>Visual Studio</strong>
            </td>
            <td ng-show="showCols.qt" style="background-color: #2D3748; color: white;">
                <strong>QT</strong>
            </td>
        </tr>
        </thead>
        <tbody ng-repeat="table in shortcutTables">
            <tr ng-repeat="shortcut in table.shortcuts | filter:search">
                <td><span ng-bind-html="shortcut.description | highlight:search"></span></td>
                
                <!-- ng-show applied to data rows -->
                <td ng-show="showCols.eclipse"><span ng-bind-html="shortcut.eclipse | highlight:search"></span></td>
                <td ng-show="showCols.vscode"><span ng-bind-html="shortcut.vscode | highlight:search"></span></td>
                <td ng-show="showCols.intellij"><span ng-bind-html="shortcut.intellij | highlight:search"></span></td>
                <td ng-show="showCols.visualstudio"><span ng-bind-html="shortcut.visualstudio | highlight:search"></span></td>
                <td ng-show="showCols.qt"><span ng-bind-html="shortcut.qt | highlight:search"></span></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
